# Customer-side docker-compose.
#
# Usage on the customer's machine:
#   1. Copy .env.example -> .env and fill in the image ref + public URL.
#   2. docker compose up -d
#   3. Open http://<host>:5678 in the browser and complete the owner setup
#      wizard (pick your own email + password). On first start the
#      entrypoint waits for setup to finish, then auto-imports the baked-in
#      workflows and restarts n8n.
#
# The data volume persists workflows across restarts; removing the volume
# triggers a fresh import on next start.

services:
  n8n:
    image: ${N8N_IMAGE}            # e.g. registry.example.com/n8n/n8n-client-a:1.0
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # --- Chinese UI + Enterprise mock (baked into image, repeat here for clarity) ---
      N8N_DEFAULT_LOCALE: zh-CN
      N8N_ENTERPRISE_MOCK: "true"
      NODE_ENV: development
      # Allow plain-HTTP access (no TLS). Set to "true" behind a TLS proxy.
      N8N_SECURE_COOKIE: "false"
      # --- Public URL (set to the customer-facing address). ---
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      # --- Execution mode. Queue mode requires redis; regular mode is fine for a
      #     single-node customer box. ---
      EXECUTIONS_MODE: ${EXECUTIONS_MODE:-regular}
      # --- Keep built-in workflows dir in sync with the image's entrypoint. ---
      N8N_BUILTIN_WORKFLOWS_DIR: /workflows
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
